name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write version file
        run: |
          echo "VERSION = \"v${{ steps.version.outputs.version }}\"" > version.py

      - name: Build app
        run: pyinstaller "RAW Viewer.spec" --noconfirm

      - name: Import certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Sign app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="dist/RAW Viewer.app"
          IDENTITY="Developer ID Application: Yannick Pulver ($APPLE_TEAM_ID)"
          SIGN="codesign --force --options runtime --entitlements entitlements.plist --sign"

          # 1. Sign .framework bundles (inner binaries first, then the framework bundle)
          find "$APP" -name "*.framework" -type d | sort -r | while read fw; do
            # Sign all Mach-O files inside the framework
            find "$fw" -type f -perm +111 | while read bin; do
              $SIGN "$IDENTITY" "$bin"
            done
            # Sign the framework bundle itself
            $SIGN "$IDENTITY" "$fw"
          done

          # 2. Sign remaining .dylib and .so files
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) | while read lib; do
            $SIGN "$IDENTITY" "$lib"
          done

          # 3. Sign standalone executables (not inside frameworks, not the main app)
          find "$APP/Contents/MacOS" -type f -perm +111 | while read bin; do
            $SIGN "$IDENTITY" "$bin"
          done
          find "$APP/Contents/Resources" -maxdepth 1 -type f -perm +111 | while read bin; do
            $SIGN "$IDENTITY" "$bin"
          done
          find "$APP/Contents/Frameworks" -maxdepth 1 -type f -perm +111 | while read bin; do
            $SIGN "$IDENTITY" "$bin"
          done

          # 4. Sign the app bundle last
          $SIGN "$IDENTITY" "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"
          echo "Signing verified successfully"

      - name: Zip app bundle
        run: |
          cd dist
          zip -r "RAW-Viewer.zip" "RAW Viewer.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/RAW-Viewer.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple app
        run: |
          for i in 1 2 3; do
            xcrun stapler staple "dist/RAW Viewer.app" && break
            echo "Staple attempt $i failed, waiting 15s..."
            sleep 15
          done

      - name: Re-zip after stapling
        run: |
          rm dist/RAW-Viewer.zip
          cd dist
          zip -r "RAW-Viewer.zip" "RAW Viewer.app"

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RAW Viewer ${{ steps.version.outputs.version }}
          files: dist/RAW-Viewer.zip
          generate_release_notes: true
