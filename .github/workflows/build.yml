name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write version file
        run: |
          echo "VERSION = \"v${{ steps.version.outputs.version }}\"" > version.py

      - name: Build app
        run: pyinstaller "RAW Viewer.spec" --noconfirm

      - name: Import certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Sign app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Sign all binaries and dylibs inside the app bundle
          find "dist/RAW Viewer.app" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -exec \
            codesign --force --options runtime --entitlements entitlements.plist \
            --sign "Developer ID Application: Yannick Pulver ($APPLE_TEAM_ID)" {} \;
          # Sign the app bundle itself
          codesign --force --options runtime --entitlements entitlements.plist \
            --sign "Developer ID Application: Yannick Pulver ($APPLE_TEAM_ID)" \
            "dist/RAW Viewer.app"

      - name: Zip app bundle
        run: |
          cd dist
          zip -r "RAW-Viewer.zip" "RAW Viewer.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/RAW-Viewer.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple app
        run: xcrun stapler staple "dist/RAW Viewer.app"

      - name: Re-zip after stapling
        run: |
          rm dist/RAW-Viewer.zip
          cd dist
          zip -r "RAW-Viewer.zip" "RAW Viewer.app"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RAW Viewer ${{ steps.version.outputs.version }}
          files: dist/RAW-Viewer.zip
          generate_release_notes: true
