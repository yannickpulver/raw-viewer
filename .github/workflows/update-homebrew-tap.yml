name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.3)"
        required: true

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download asset and compute sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/RAW-Viewer.zip"
          curl -fsSL -o asset.zip "$URL"
          SHA=$(sha256sum asset.zip | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: yannickpulver/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write cask
        run: |
          cat > tap/Casks/raw-viewer.rb <<EOF
          cask "raw-viewer" do
            version "${{ steps.ver.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"

            url "https://github.com/yannickpulver/raw-viewer/releases/download/v#{version}/RAW-Viewer.zip"
            name "RAW Viewer"
            desc "RAW image viewer"
            homepage "https://github.com/yannickpulver/raw-viewer"

            app "RAW Viewer.app"

            zap trash: [
              "~/Library/Preferences/com.yannickpulver.raw-viewer.plist",
              "~/Library/Application Support/RAW Viewer",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/raw-viewer.rb
          git diff --cached --quiet && exit 0
          git commit -m "raw-viewer ${{ steps.ver.outputs.version }}"
          git push
